name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Umer1444
          outputs: |
            dist/github-snake.svg?color_snake=A78BFA&color_dots=#0D1117,#4C1D95,#6D28D9,#7C3AED,#A78BFA
            dist/github-snake-dark.svg?color_snake=A78BFA&color_dots=#0D1117,#4C1D95,#6D28D9,#7C3AED,#A78BFA

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
