name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Umer1444
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=7C3AED&color_dots=#0D0D0D,#4C1D95,#6D28D9,#7C3AED,#A78BFA
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=7C3AED&color_dots=#0D0D0D,#4C1D95,#6D28D9,#7C3AED,#A78BFA

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
